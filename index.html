<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ยืนยันลงเวลา</title>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow text-center" style="max-width: 400px;">
        <h4>ยืนยันลงเวลา (Biometric)</h4>
        <hr>
        <div id="info" class="text-start mb-3 small"></div>

        <div id="login-section">
            <input type="text" id="user" class="form-control mb-2" placeholder="Username">
            <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
            <button id="login-btn" class="btn btn-primary w-100" onclick="doLogin()">Login</button>
        </div>

        <div id="confirm-section" class="hidden d-none">
            <button id="verify-btn" class="btn btn-success btn-lg w-100 py-4" onclick="handleVerify()">
                👆 สแกนนิ้ว/ใบหน้า ยืนยัน
            </button>
        </div>
        <div id="status" class="mt-3 alert d-none"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const params = {
            m: urlParams.get('m') || 'ไม่ได้ระบุ',
            d: urlParams.get('d') || 'ไม่ได้ระบุ',
            t: urlParams.get('t') || 'เข้างาน'
        };

        // *** ตรวจสอบ URL ตรงนี้ให้ถูกต้อง ***
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyoY8cZqYTue-Oy0F0y9OaVNPUxSy56MSDbiN5B5RxGePyCCqlrc3Ls07rVQJs-bqhh9g/exec";

       

        document.getElementById('info').innerHTML = `เครื่อง: ${params.m}<br>หน่วยงาน: ${params.d}<br>ประเภท: ${params.t}`;

        let empId = "";

        async function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('login-btn');
            
            if(!u || !p) { alert("กรุณากรอกข้อมูลให้ครบ"); return; }

            btn.disabled = true;
            btn.innerText = "กำลังตรวจสอบ...";

            try {
                // ส่งแบบ text/plain เพื่อเลี่ยงปัญหา CORS ในเบราว์เซอร์บางตัว
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors', // เปลี่ยนเป็น cors
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', // ใช้ text/plain เพื่อเลี่ยง CORS
                    },
                    body: JSON.stringify({ action: 'login', username: u, password: p })
                });
                const data = await res.json();
                
                if(data.success) {
                    empId = data.user.empId;
                    document.getElementById('login-section').classList.add('d-none');
                    document.getElementById('confirm-section').classList.remove('d-none');
                } else {
                    alert("เข้าสู่ระบบไม่สำเร็จ: " + data.message);
                }
            } catch (err) {
                console.error(err);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ Google Script");
            } finally {
                btn.disabled = false;
                btn.innerText = "Login";
            }
        }

        async function handleVerify() {
            if (!window.PublicKeyCredential) {
                alert("เครื่องนี้ไม่รองรับระบบ Biometrics (สแกนนิ้ว/ใบหน้า)");
                // ในกรณีที่ไม่รองรับ เราอาจจะอนุญาตให้บันทึกได้เลย หรือใช้ PIN แทน
            }

            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ 
                        action: 'scan', 
                        empId: empId, 
                        qrData: `${params.m}|${params.d}|${params.t}` 
                    })
                });
                const result = await res.json();
                const s = document.getElementById('status');
                s.className = `alert mt-3 ${result.message.includes('✅') ? 'alert-success' : 'alert-danger'}`;
                s.innerText = result.message;
                s.classList.remove('d-none');
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
            } finally {
                btn.disabled = false;
                btn.innerText = "👆 สแกนนิ้ว/ใบหน้า ยืนยัน";
            }
        }
    </script>
</body>
</html>
