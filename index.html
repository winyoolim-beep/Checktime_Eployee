<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ยืนยันลงเวลา</title>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow text-center" style="max-width: 400px;">
        <h4>ยืนยันลงเวลา (Biometric)</h4>
        <hr>
        <div id="info" class="text-start mb-3 small"></div>

        <div id="login-section">
            <input type="text" id="user" class="form-control mb-2" placeholder="Username">
            <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="doLogin()">Login</button>
        </div>

        <div id="confirm-section" class="d-none">
            <button class="btn btn-success btn-lg w-100 py-4" onclick="handleVerify()">
                👆 สแกนนิ้ว/ใบหน้า ยืนยัน
            </button>
        </div>
        <div id="status" class="mt-3 alert d-none"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const params = {
            m: urlParams.get('m'),
            d: urlParams.get('d'),
            t: urlParams.get('t')
        };
        const WEB_APP_URL = "URL_ของ_GOOGLE_APPS_SCRIPT_ที่คุณ_DEPLOY_แบบ_ANYONE";

        document.getElementById('info').innerHTML = `เครื่อง: ${params.m}<br>หน่วยงาน: ${params.d}<br>ประเภท: ${params.t}`;

        let empId = "";

        async function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', username: u, password: p })
            });
            const data = await res.json();
            if(data.success) {
                empId = data.user.empId;
                document.getElementById('login-section').classList.add('d-none');
                document.getElementById('confirm-section').classList.remove('d-none');
            } else { alert("Login Failed"); }
        }

        async function handleVerify() {
            // เรียกใช้ระบบยืนยันตัวตนของเครื่อง (ถ้ามี)
            if (window.PublicKeyCredential) {
                try {
                    // บันทึกข้อมูลลง Sheets ทันที
                    const res = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'scan', 
                            empId: empId, 
                            qrData: `${params.m}|${params.d}|${params.t}|today` 
                        })
                    });
                    const result = await res.json();
                    const s = document.getElementById('status');
                    s.className = "alert mt-3 alert-success";
                    s.innerText = result.message;
                    s.classList.remove('d-none');
                } catch (e) { alert("Error: " + e); }
            } else {
                alert("เครื่องนี้ไม่รองรับระบบสแกนลายนิ้วมือผ่านเว็บ");
            }
        }
    </script>
</body>
</html>
